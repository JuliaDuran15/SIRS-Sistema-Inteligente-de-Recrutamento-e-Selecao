name: Lint e testes

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instala dependências
        run: pip install ruff pytest httpx fastapi pydantic-settings

      - name: Lint
        run: ruff check app/

      - name: Testes
        run: pytest tests/ -v --tb=short